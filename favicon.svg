<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="WB">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101B31"/>
      <stop offset="1" stop-color="#0A0F1A"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8EC5FF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bg)" stroke="#58A6FF" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- discrète topologie réseau : nœuds + liens -->
  <g stroke="#58A6FF" stroke-opacity="0.28" stroke-width="1.1">
    <line x1="12" y1="15" x2="52" y2="12"/>
    <line x1="12" y1="15" x2="14" y2="50"/>
    <line x1="52" y1="12" x2="50" y2="52"/>
    <line x1="14" y1="50" x2="50" y2="52"/>
  </g>
  <g fill="#3DDC97">
    <circle cx="12" cy="15" r="2"/><circle cx="52" cy="12" r="2"/>
    <circle cx="14" cy="50" r="2"/><circle cx="50" cy="52" r="2"/>
  </g>
  <!-- monogramme WB -->
  <text x="32" y="41" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',system-ui,sans-serif"
        font-size="30" font-weight="700" letter-spacing="-1" fill="url(#ink)">WB</text>
</svg>
